<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mini_project.css">
    <title>Mini Calculator</title>
<body>

    <div class="calculator">
        <h1>💥 Mini Calculator</h1>

        <input type="number" placeholder="Enter first number" id="rull-1">
        <input type="number" placeholder="Enter second number" id="rull-2">

        <div class="buttons">
            <button onclick="Add()">+</button>
            <button onclick="Sub()">−</button>
            <button onclick="Mul()">×</button>
            <button onclick="Dvd()">÷</button>
        </div>

        <div class="results">
            <h2 id="adding"></h2>
            <h2 id="subtracting"></h2>
            <h2 id="multipling"></h2>
            <h3 id="divising"></h3>
        </div>
    </div>

    <script>
        function Add() {
            var sum1 = parseInt(document.getElementById("rull-1").value);
            var sum2 = parseInt(document.getElementById("rull-2").value);
            document.getElementById("adding").innerHTML = "Value: " + (sum1 + sum2);
        }

        function Sub() {
            var sum1 = document.getElementById("rull-1").value;
            var sum2 = document.getElementById("rull-2").value;
            document.getElementById("subtracting").innerHTML = "Value: " + (sum1 - sum2);
        }

        function Mul() {
            var sum1 = document.getElementById("rull-1").value;
            var sum2 = document.getElementById("rull-2").value;
            document.getElementById("multipling").innerHTML = "Value: " + (sum1 * sum2);
        }

        function Dvd() {
            var sum1 = document.getElementById("rull-1").value;
            var sum2 = document.getElementById("rull-2").value;
            document.getElementById("divising").innerHTML = "Value: " + (sum1 / sum2);
        }
    </script>

</body>
</html>
